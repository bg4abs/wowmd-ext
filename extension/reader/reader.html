<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wowMD Reader</title>
  <link rel="stylesheet" href="reader.css">
</head>
<body>
  <div class="reader-shell">
    <header class="reader-topbar">
      <div class="reader-brand" aria-label="wowMD">
        <span class="reader-brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
        <span class="reader-brand-text" aria-hidden="true"><span class="reader-brand-wow">wow</span><span class="reader-brand-md">MD</span></span>
        <span class="reader-version" id="reader-version">v0.3.0</span>
      </div>
      <div class="reader-file">
        <span class="reader-repo" id="reader-repo">Markdown</span>
        <span class="reader-path" id="reader-path">Loading...</span>
      </div>
      <nav class="reader-actions" aria-label="Reader actions">
        <span class="reader-webapp-wrap hidden" id="reader-webapp-wrap">
          <a class="reader-webapp-action" id="reader-webapp" href="#" target="_blank" rel="noopener noreferrer" aria-describedby="reader-webapp-tooltip">Continue in Web App &rarr;</a>
          <span class="reader-webapp-tooltip" id="reader-webapp-tooltip" role="tooltip">
            <span class="reader-webapp-tooltip-title">Open in the full wowMD workspace</span>
            <span class="reader-webapp-tooltip-list">
              <span>Better reading experience</span>
              <span>Custom Highlights &amp; Notes</span>
              <span>Export to HTML</span>
              <span>Full local access</span>
            </span>
          </span>
        </span>
        <a class="reader-action" id="reader-source" href="#" target="_blank" rel="noopener noreferrer">View on GitHub</a>
        <button class="reader-action" id="reader-close" type="button">Close</button>
      </nav>
    </header>

    <main class="reader-layout">
      <aside class="reader-outline" aria-label="Document outline">
        <p class="reader-outline-label">Outline</p>
        <div class="reader-outline-list" id="reader-outline"></div>
      </aside>

      <section class="reader-main" id="reader-scroll">
        <article class="reader-document" id="reader-document">
          <div class="reader-status">Preparing document...</div>
        </article>
      </section>
    </main>
  </div>

  <script src="../content/i18n.js"></script>
  <script src="../lib/dompurify.min.js"></script>
  <script src="../lib/markdown-it.min.js"></script>
  <script src="../lib/highlight.min.js"></script>
  <script src="../content/resource.js"></script>
  <script src="../content/render.js"></script>
  <script src="../content/toc.js"></script>
  <script src="../content/fold.js"></script>
  <script src="reader.js"></script>
</body>
</html>
